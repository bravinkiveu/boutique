{% extends 'base.html' %}

{% block content %}

<h1>Checkout</h1>

<p>
Subtotal: KSh {{ total }}
</p>

<p>
Discount: {{ discount }}%
</p>

<h3>
Final Total: KSh {{ final_total }}
</h3>

<form method="POST">
    {% csrf_token %}

    <label>Promo Code</label>

    <input
        type="text"
        name="coupon"
        placeholder="Enter Coupon Code">

    <br><br>

    <input type="text"
           name="customer_name"
           placeholder="Full Name"
           required>

    <br><br>

    <input type="email"
           name="email"
           placeholder="Email Address"
           required>

    <br><br>

    <input type="text"
           name="phone"
           placeholder="Phone Number"
           required>

    <br><br>

    <textarea name="address"
              placeholder="Delivery Address"
              required></textarea>

    <br><br>

    <button type="submit">
        Place Order
    </button>

</form>

{% endblock %}
