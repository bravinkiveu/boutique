{% extends 'base.html' %}

{% block content %}

<h1>Search Results</h1>

<p>You searched for: {{ query }}</p>

{% for product in products %}

<div>

    <img src="{{ product.image.url }}" width="150">

    <h3>{{ product.name }}</h3>

    <p>KSh {{ product.price }}</p>

</div>

{% empty %}

<p>No products found.</p>

{% endfor %}

{% endblock %}
