{% extends 'base.html' %}

{% block content %}

<h2>Shopping Cart</h2>

<table class="table">

<tr>
    <th>Product</th>
    <th>Price</th>
    <th>Qty</th>
    <th>Subtotal</th>
</tr>

{% for item in products %}

<tr>

<td>{{ item.product.name }}</td>

<td>KSh {{ item.product.price }}</td>

<td>{{ item.quantity }}</td>

<td>KSh {{ item.subtotal }}</td>

</tr>

{% endfor %}

</table>

<h3>Total: KSh {{ total }}</h3>

<a href="{% url 'checkout' %}"
   class="btn btn-primary">
   Checkout
</a>

{% endblock %}
