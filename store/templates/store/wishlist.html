{% extends 'base.html' %}

{% block content %}

<h2>My Wishlist</h2>

<div class="row">

{% for item in items %}

<div class="col-md-4">

    <div class="card mb-3">

        <img src="{{ item.product.image.url }}"
             class="card-img-top">

        <div class="card-body">

            <h5>{{ item.product.name }}</h5>

            <p>KSh {{ item.product.price }}</p>

            <a href="{% url 'product_detail' item.product.id %}"
               class="btn btn-primary me-2">View Product</a>

            <a href="{% url 'remove_wishlist' item.product.id %}"
               class="btn btn-danger">Remove</a>

        </div>

    </div>

</div>

{% empty %}

<p>No items in wishlist.</p>

{% endfor %}

</div>

{% endblock %}
