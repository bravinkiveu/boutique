<!DOCTYPE html>
<html>
<head>
    <title>Bravin Boutique</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <style>
        body {
            background: #82a0d3;
        }

        .hero-card {
            background: #ba9a09;
            border-radius: 1.5rem;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.08);
        }

        .sidebar {
            min-height: calc(100vh - 72px);
            height: calc(100vh - 72px);
            overflow-y: auto;
            background: #ffffff;
            border-right: 1px solid rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 72px;
        }


        .sidebar h5 {
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .sidebar .nav-link {
            margin-bottom: 0.85rem;
            border-radius: 1rem;
            padding: 0.95rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 600;
            color: #212529;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            border: 1px solid transparent;
        }

        .sidebar .nav-link span.label {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
        }

        .sidebar .nav-link span.icon {
            width: 2rem;
            height: 2rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 0.75rem;
            background: #ffffff;
            box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.08);
        }


        .sidebar .nav-link .nav-arrow {
            font-size: 1.2rem;
            opacity: 0.65;
        }

        .sidebar .nav-link:hover {
            transform: translateX(4px);
            text-decoration: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        .nav-home {
            color: #0d6efd;
            background: rgba(13, 110, 253, 0.08);
            border-color: rgba(13, 110, 253, 0.18);
        }

        .nav-shoes {
            color: #d39e00;
            background: rgba(255, 193, 7, 0.12);
            border-color: rgba(255, 193, 7, 0.25);
        }



        .nav-clothes {
            color: #0d6efd;
            background: rgba(13, 110, 253, 0.08);
            border-color: rgba(13, 110, 253, 0.18);
        }




        .nav-orders {
            color: #6f42c1;
            background: rgba(111, 66, 193, 0.12);
            border-color: rgba(111, 66, 193, 0.2);
        }

        .nav-wishlist {
            color: #d63384;
            background: rgba(255, 192, 203, 0.18);
            border-color: rgba(255, 192, 203, 0.28);
        }

        .nav-about {
            color: #dc3545;
            background: rgba(220, 53, 69, 0.12);
            border-color: rgba(220, 53, 69, 0.22);
        }

        .product-card {
            border: none;
            border-radius: 1.5rem;
            overflow: hidden;
            background: #212529;
            color: #ffffff;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        }


        .product-card img {
            border-radius: 1.5rem 1.5rem 0 0;
            object-fit: cover;
            height: 260px;
        }

        .product-card .card-body {
            background: #222129;
        }

        .product-card .btn {
            width: 100%;
        }

        @media (max-width: 767px) {
            .sidebar {
                min-height: auto;
            }
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-success">

    <div class="container">

        <a class="navbar-brand" href="/">
            Bravin Boutique
        </a>


        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#sidebarMenu" aria-controls="sidebarMenu" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="d-flex align-items-center">

            <form class="d-flex me-2" method="get" action="{% url 'search' %}">
                <input class="form-control me-2" type="search" name="q" placeholder="Search" aria-label="Search">
                <button class="btn btn-outline-light" type="submit">Search</button>
            </form>

            <a class="btn btn-warning" href="/cart/">Cart</a>

        </div>

    </div>

</nav>

<div class="container-fluid mt-4">
    <div class="row">
        <aside class="col-md-3 col-lg-2 sidebar p-3 collapse d-md-block" id="sidebarMenu">
            <h5 class="mb-3">Menu</h5>
            <ul class="nav flex-column">
                <li class="nav-item mb-2">
                    <a class="nav-link nav-home" href="{% url 'home' %}">
                        <span class="label"><span class="icon">🏠</span> Home</span>
                        <span class="nav-arrow">›</span>
                    </a>
                </li>
                <li class="nav-item mb-2">
                    <a class="nav-link nav-shoes" href="{% url 'shoes' %}">
                        <span class="label"><span class="icon">👟</span> Shoes</span>
                        <span class="nav-arrow">›</span>
                    </a>
                </li>
                <li class="nav-item mb-2">
                    <a class="nav-link nav-clothes" href="{% url 'clothes' %}">
                        <span class="label"><span class="icon">👕</span> Clothes</span>
                        <span class="nav-arrow">›</span>
                    </a>
                </li>
                <li class="nav-item mb-2">
                    <a class="nav-link nav-orders" href="{% url 'order_history' %}">
                        <span class="label"><span class="icon">📦</span> My Orders</span>
                        <span class="nav-arrow">›</span>
                    </a>
                </li>
                <li class="nav-item mb-2">
                    <a class="nav-link nav-wishlist" href="{% url 'wishlist' %}">
                        <span class="label"><span class="icon">❤️</span> Wishlist</span>
                        <span class="nav-arrow">›</span>
                    </a>
                </li>
                <li class="nav-item mb-2">
                    <a class="nav-link nav-addresses" href="{% url 'addresses' %}">
                        <span class="label"><span class="icon">📍</span> My Addresses</span>
                        <span class="nav-arrow">›</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link nav-about" href="{% url 'about' %}">
                        <span class="label"><span class="icon">ℹ️</span> About Us</span>
                        <span class="nav-arrow">›</span>
                    </a>
                </li>


            </ul>
        </aside>


        <main class="col-md-9 col-lg-10 mt-3">
            {% block content %}
            {% endblock %}
        </main>
    </div>
</div>

<footer class="text-white text-center p-3 mt-5" style="background-color: purple;">

    <p>
        © 2026 Bravin Boutique. All Rights Reserved.

    </p>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        var sidebar = document.getElementById('sidebarMenu');
        var sidebarCollapse = bootstrap.Collapse.getOrCreateInstance(sidebar);
        var sidebarLinks = sidebar.querySelectorAll('.nav-link');

        sidebarLinks.forEach(function (link) {
            link.addEventListener('click', function () {
                sidebarCollapse.hide();
            });
        });
    });
</script>
</body>
</html>
