{% extends "admin/base.html" %}
{% load i18n %}

{% block title %}{{ title }} | Bravin Boutique Admin{% endblock %}

{% block branding %}
<div id="site-name">
    <a href="{% url 'admin:index' %}">
        <span style="font-size:24px;margin-right:10px;">🛍️</span>
        Bravin Boutique
    </a>
</div>
{% endblock %}

{% block extrastyle %}
{{ block.super }}
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
    :root {
        --primary: #6366f1;
        --primary-dark: #4f46e5;
        --primary-light: #818cf8;
        --accent: #22d3ee;
        --bg-body: #0f172a;
        --bg-surface: #1e293b;
        --bg-surface-hover: #334155;
        --bg-card: #1e293b;
        --border-color: rgba(148, 163, 184, 0.1);
        --text-primary: #f1f5f9;
        --text-secondary: #94a3b8;
        --text-muted: #64748b;
        --success: #22c55e;
        --warning: #f59e0b;
        --danger: #ef4444;
        --radius: 12px;
        --shadow: 0 4px 6px -1px rgba(0,0,0,0.3), 0 2px 4px -2px rgba(0,0,0,0.3);
    }

    /* ─── Global ─── */
    * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif !important; }
    body { background: var(--bg-body) !important; color: var(--text-primary) !important; }
    a:link, a:visited { color: var(--primary-light) !important; }
    a:hover { color: var(--accent) !important; }

    /* ─── Header / Branding ─── */
    #header {
        background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #3730a3 100%) !important;
        padding: 16px 28px !important;
        box-shadow: 0 4px 30px rgba(99, 102, 241, 0.15) !important;
        border-bottom: 1px solid rgba(99, 102, 241, 0.2) !important;
    }
    #header a:link, #header a:visited { color: #fff !important; }
    #site-name a {
        font-weight: 800 !important;
        font-size: 22px !important;
        letter-spacing: -0.02em !important;
        display: inline-flex !important;
        align-items: center !important;
    }
    #branding h1, #branding h2 { margin: 0 !important; }

    #user-tools {
        font-size: 13px !important;
        font-weight: 500 !important;
        color: rgba(255,255,255,0.7) !important;
    }
    #user-tools a { color: rgba(255,255,255,0.9) !important; font-weight: 600 !important; }
    #user-tools a:hover { color: var(--accent) !important; }

    /* ─── Breadcrumbs ─── */
    div.breadcrumbs {
        background: var(--bg-surface) !important;
        color: var(--text-secondary) !important;
        padding: 12px 28px !important;
        font-size: 13px !important;
        border-bottom: 1px solid var(--border-color) !important;
    }
    div.breadcrumbs a { color: var(--primary-light) !important; font-weight: 500 !important; }

    /* ─── Content Area ─── */
    #content {
        padding: 28px !important;
    }
    #content h1 {
        font-size: 28px !important;
        font-weight: 800 !important;
        letter-spacing: -0.03em !important;
        color: var(--text-primary) !important;
        margin-bottom: 24px !important;
    }
    #content h2 {
        font-size: 18px !important;
        font-weight: 700 !important;
        color: var(--text-primary) !important;
    }

    /* ─── Modules / App Cards ─── */
    .module {
        background: var(--bg-card) !important;
        border: 1px solid var(--border-color) !important;
        border-radius: var(--radius) !important;
        overflow: hidden !important;
        margin-bottom: 20px !important;
        box-shadow: var(--shadow) !important;
    }
    .module h2, .module caption {
        background: linear-gradient(135deg, var(--primary-dark), var(--primary)) !important;
        color: #fff !important;
        padding: 14px 20px !important;
        font-size: 14px !important;
        font-weight: 700 !important;
        text-transform: uppercase !important;
        letter-spacing: 0.05em !important;
        border: none !important;
    }
    .module table { background: transparent !important; }
    .module table th {
        background: rgba(99, 102, 241, 0.08) !important;
        color: var(--text-secondary) !important;
        font-size: 11px !important;
        text-transform: uppercase !important;
        letter-spacing: 0.06em !important;
        font-weight: 700 !important;
        padding: 12px 16px !important;
        border-bottom: 1px solid var(--border-color) !important;
    }
    .module table td {
        padding: 12px 16px !important;
        color: var(--text-primary) !important;
        border-bottom: 1px solid var(--border-color) !important;
    }
    .module table tr:hover td { background: rgba(99, 102, 241, 0.04) !important; }

    /* ─── Dashboard Model Links ─── */
    .dashboard #content-main .module th a,
    .dashboard #content-main .module td a {
        font-weight: 600 !important;
    }
    table td a:link, table td a:visited { font-weight: 600 !important; }

    /* ─── Sidebar / Recent Actions ─── */
    #content-related {
        background: var(--bg-card) !important;
        border: 1px solid var(--border-color) !important;
        border-radius: var(--radius) !important;
        overflow: hidden !important;
        box-shadow: var(--shadow) !important;
    }
    #content-related h2 {
        background: linear-gradient(135deg, #7c3aed, #a855f7) !important;
        color: #fff !important;
        padding: 14px 20px !important;
        font-size: 13px !important;
        font-weight: 700 !important;
        text-transform: uppercase !important;
        letter-spacing: 0.05em !important;
    }
    #content-related .module h3 {
        color: var(--text-primary) !important;
        padding: 10px 20px !important;
        font-size: 13px !important;
        background: rgba(139, 92, 246, 0.06) !important;
    }
    #content-related ul li {
        padding: 8px 20px !important;
        border-bottom: 1px solid var(--border-color) !important;
        color: var(--text-secondary) !important;
        font-size: 13px !important;
    }

    /* ─── Buttons ─── */
    input[type="submit"], .submit-row input, button, .button, a.button {
        background: linear-gradient(135deg, var(--primary), var(--primary-dark)) !important;
        color: #fff !important;
        border: none !important;
        border-radius: 8px !important;
        padding: 10px 24px !important;
        font-weight: 600 !important;
        font-size: 13px !important;
        cursor: pointer !important;
        transition: all 0.2s ease !important;
        box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3) !important;
    }
    input[type="submit"]:hover, .submit-row input:hover, button:hover, .button:hover {
        background: linear-gradient(135deg, var(--primary-light), var(--primary)) !important;
        transform: translateY(-1px) !important;
        box-shadow: 0 4px 16px rgba(99, 102, 241, 0.4) !important;
    }
    .submit-row {
        background: var(--bg-surface) !important;
        border: 1px solid var(--border-color) !important;
        border-radius: var(--radius) !important;
        padding: 16px !important;
        overflow: visible !important;
    }
    .submit-row a.deletelink {
        background: linear-gradient(135deg, var(--danger), #dc2626) !important;
        border-radius: 8px !important;
        padding: 10px 20px !important;
        box-shadow: 0 2px 8px rgba(239, 68, 68, 0.3) !important;
    }
    input[type="submit"].default {
        background: linear-gradient(135deg, var(--success), #16a34a) !important;
        box-shadow: 0 2px 8px rgba(34, 197, 94, 0.3) !important;
    }
    input[type="submit"].default:hover {
        box-shadow: 0 4px 16px rgba(34, 197, 94, 0.4) !important;
    }

    /* ─── Forms ─── */
    input[type="text"], input[type="password"], input[type="email"],
    input[type="url"], input[type="number"], input[type="tel"],
    textarea, select, .vTextField, .vURLField {
        background: var(--bg-body) !important;
        color: var(--text-primary) !important;
        border: 1px solid var(--border-color) !important;
        border-radius: 8px !important;
        padding: 10px 14px !important;
        font-size: 14px !important;
        transition: border-color 0.2s ease, box-shadow 0.2s ease !important;
    }
    input[type="text"]:focus, input[type="password"]:focus, input[type="email"]:focus,
    textarea:focus, select:focus {
        border-color: var(--primary) !important;
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15) !important;
        outline: none !important;
    }
    label { color: var(--text-secondary) !important; font-weight: 600 !important; font-size: 13px !important; }
    .help, .helptext, p.help { color: var(--text-muted) !important; font-size: 12px !important; }

    /* ─── Fieldsets ─── */
    fieldset {
        background: var(--bg-card) !important;
        border: 1px solid var(--border-color) !important;
        border-radius: var(--radius) !important;
        padding: 20px !important;
        margin-bottom: 20px !important;
    }
    fieldset h2, fieldset .collapse-toggle {
        color: var(--text-primary) !important;
        font-size: 15px !important;
    }

    /* ─── Changelist Filters ─── */
    #changelist-filter {
        background: var(--bg-card) !important;
        border: 1px solid var(--border-color) !important;
        border-radius: var(--radius) !important;
        box-shadow: var(--shadow) !important;
    }
    #changelist-filter h2 {
        background: linear-gradient(135deg, var(--primary-dark), var(--primary)) !important;
        color: #fff !important;
        padding: 14px 16px !important;
        font-size: 12px !important;
        text-transform: uppercase !important;
        letter-spacing: 0.06em !important;
        border-radius: var(--radius) var(--radius) 0 0 !important;
    }
    #changelist-filter h3 {
        color: var(--text-primary) !important;
        padding: 10px 16px 4px !important;
        font-size: 12px !important;
        font-weight: 700 !important;
    }
    #changelist-filter ul li a {
        color: var(--text-secondary) !important;
        padding: 4px 16px !important;
        display: block !important;
        font-size: 13px !important;
    }
    #changelist-filter ul li.selected a { color: var(--accent) !important; font-weight: 700 !important; }

    /* ─── Changelist ─── */
    #changelist { background: transparent !important; }
    #changelist .actions {
        background: var(--bg-surface) !important;
        border: 1px solid var(--border-color) !important;
        border-radius: 8px !important;
        padding: 12px 16px !important;
        margin-bottom: 16px !important;
    }
    #changelist .actions label { color: var(--text-secondary) !important; }
    #changelist .actions select {
        background: var(--bg-body) !important;
        color: var(--text-primary) !important;
        border-radius: 6px !important;
    }
    #changelist .paginator {
        background: var(--bg-surface) !important;
        color: var(--text-secondary) !important;
        border: 1px solid var(--border-color) !important;
        border-radius: 0 0 var(--radius) var(--radius) !important;
        padding: 12px 16px !important;
    }
    #changelist table thead th {
        background: rgba(99, 102, 241, 0.1) !important;
    }
    .object-tools a {
        background: linear-gradient(135deg, var(--primary), var(--primary-dark)) !important;
        border-radius: 8px !important;
        padding: 8px 16px !important;
        font-weight: 600 !important;
    }
    .object-tools a:hover {
        background: linear-gradient(135deg, var(--primary-light), var(--primary)) !important;
    }

    /* ─── Login Page ─── */
    body.login {
        background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%) !important;
    }
    body.login #container {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }
    body.login #header {
        background: transparent !important;
        box-shadow: none !important;
        border: none !important;
        padding: 0 0 32px 0 !important;
        text-align: center;
    }
    body.login #header h1 a {
        font-size: 32px !important;
    }
    body.login #content-main {
        display: flex;
        justify-content: center;
    }
    body.login #content {
        background: var(--bg-card) !important;
        border: 1px solid rgba(99, 102, 241, 0.2) !important;
        border-radius: 20px !important;
        padding: 40px 48px !important;
        width: 420px !important;
        max-width: 90vw !important;
        box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 80px rgba(99, 102, 241, 0.08) !important;
    }
    body.login #content h1 {
        text-align: center !important;
        font-size: 22px !important;
        margin-bottom: 28px !important;
        color: var(--text-primary) !important;
    }
    body.login .form-row {
        margin-bottom: 20px !important;
        padding: 0 !important;
        border-bottom: none !important;
    }
    body.login .form-row label {
        display: block !important;
        margin-bottom: 8px !important;
        font-size: 13px !important;
        font-weight: 600 !important;
        color: var(--text-secondary) !important;
    }
    body.login .form-row #id_username,
    body.login .form-row #id_password {
        width: 100% !important;
        padding: 12px 16px !important;
        font-size: 15px !important;
        background: var(--bg-body) !important;
        border: 1px solid var(--border-color) !important;
        border-radius: 10px !important;
        color: var(--text-primary) !important;
    }
    body.login .form-row #id_username:focus,
    body.login .form-row #id_password:focus {
        border-color: var(--primary) !important;
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15) !important;
    }
    body.login .submit-row {
        background: transparent !important;
        border: none !important;
        padding: 8px 0 0 0 !important;
        text-align: center !important;
    }
    body.login .submit-row input[type="submit"] {
        width: 100% !important;
        padding: 14px !important;
        font-size: 16px !important;
        font-weight: 700 !important;
        border-radius: 10px !important;
        background: linear-gradient(135deg, var(--primary), #7c3aed) !important;
        box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4) !important;
    }
    body.login .submit-row input[type="submit"]:hover {
        transform: translateY(-2px) !important;
        box-shadow: 0 8px 30px rgba(99, 102, 241, 0.5) !important;
    }
    body.login .password-reset-link {
        text-align: center !important;
        margin-top: 20px !important;
    }
    body.login .password-reset-link a {
        color: var(--text-muted) !important;
        font-size: 13px !important;
    }

    /* ─── Messages ─── */
    .messagelist li {
        border-radius: 8px !important;
        margin: 8px 0 !important;
        padding: 12px 20px !important;
        font-weight: 500 !important;
    }
    .messagelist li.success {
        background: rgba(34, 197, 94, 0.12) !important;
        color: var(--success) !important;
        border: 1px solid rgba(34, 197, 94, 0.2) !important;
    }
    .messagelist li.error {
        background: rgba(239, 68, 68, 0.12) !important;
        color: var(--danger) !important;
        border: 1px solid rgba(239, 68, 68, 0.2) !important;
    }
    .messagelist li.warning {
        background: rgba(245, 158, 11, 0.12) !important;
        color: var(--warning) !important;
        border: 1px solid rgba(245, 158, 11, 0.2) !important;
    }

    /* ─── Misc ─── */
    .addlink, .changelink, .viewlink { font-weight: 600 !important; }
    p, li, td, th { color: var(--text-primary) !important; }
    .quiet, .small { color: var(--text-muted) !important; }
    hr { border-color: var(--border-color) !important; }
    .errornote {
        background: rgba(239, 68, 68, 0.1) !important;
        color: var(--danger) !important;
        border: 1px solid rgba(239, 68, 68, 0.2) !important;
        border-radius: 8px !important;
        padding: 12px 20px !important;
    }
    ul.errorlist li {
        background: rgba(239, 68, 68, 0.08) !important;
        color: var(--danger) !important;
        border-radius: 6px !important;
    }

    /* Hide Django's built-in theme toggle since we force dark */
    .theme-toggle, [data-theme-toggle] { display: none !important; }

    /* ─── Inline Related ─── */
    .inline-related { background: var(--bg-card) !important; border: 1px solid var(--border-color) !important; border-radius: var(--radius) !important; margin-bottom: 12px !important; }
    .inline-related h3 { background: rgba(99,102,241,0.08) !important; color: var(--text-primary) !important; padding: 10px 16px !important; border-bottom: 1px solid var(--border-color) !important; }
    .tabular .module table { background: transparent !important; }

    /* ─── Date Hierarchy ─── */
    .xfull { background: var(--bg-surface) !important; padding: 10px 16px !important; border-radius: 8px !important; margin-bottom: 16px !important; border: 1px solid var(--border-color) !important; }

    /* ─── Scrollbar ─── */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-body); }
    ::-webkit-scrollbar-thumb { background: var(--bg-surface-hover); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* ─── Footer ─── */
    #footer {
        background: var(--bg-surface) !important;
        border-top: 1px solid var(--border-color) !important;
        color: var(--text-muted) !important;
        padding: 16px 28px !important;
        font-size: 12px !important;
    }

    /* ─── Responsive ─── */
    @media (max-width: 768px) {
        #content { padding: 16px !important; }
        body.login #content { padding: 28px 24px !important; }
    }
</style>
{% endblock %}

{% block nav-global %}{% endblock %}
